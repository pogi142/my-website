<script>
let levels = [
"CAT","DOG","SUN","MAP","PEN","BOX","CAR","HAT","BAT","CUP",
"PLANT","WATER","LIGHT","STONE","SMILE","CHAIR","TABLE","APPLE","GRAPE","BREAD",
"POCKET","MARKET","FUTURE","GARDEN","ORANGE","PEOPLE","ANIMAL","SCHOOL","FRIEND","FAMILY",
"COUNTRY","PICTURE","HISTORY","LANGUAGE","MOUNTAIN","ELEPHANT","NOTEBOOK","BASEBALL","AIRPLANE","HOSPITAL",
"COMPUTER","EDUCATION","KNOWLEDGE","CHALLENGE","IMPORTANT","DIFFERENT","BEAUTIFUL","POWERFUL","ADVENTURE","EXPERIENCE"
];

let level = 0;
let answer = "";
let current = "";

function loadLevel(){
    current = "";
    answer = levels[level];

    document.getElementById("current").innerText =
        "Level " + (level+1) + " | Word:";
    
    document.getElementById("word").innerText =
        "_ ".repeat(answer.length);

    let letters = answer.split("").sort(()=>Math.random()-0.5);

    let container = document.getElementById("letters");
    container.innerHTML = "";

    letters.forEach(l=>{
        let div = document.createElement("div");
        div.className="letter";
        div.innerText=l;

        div.onclick=()=>{
            current += l;
            document.getElementById("current").innerText =
                "Level " + (level+1) + " | Word: " + current;
        };

        container.appendChild(div);
    });
}

function checkWord(){
    if(current === answer){
        alert("🎉 Correct! Level Up!");

        level++;

        if(level >= levels.length){
            alert("🏆 YOU BEAT LEVEL 50!");
            level = 0;
        }

        loadLevel();
    } else {
        alert("❌ Wrong!");
    }

    current="";
}

function resetWord(){
    current="";
    document.getElementById("current").innerText =
        "Level " + (level+1) + " | Word:";
}

loadLevel();
</script>
