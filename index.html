<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🎢 Coaster Rush 3D</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
}

#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
}

#menu h1 {
    font-size: 60px;
}

#startBtn {
    padding: 15px 40px;
    font-size: 22px;
    border: none;
    border-radius: 10px;
    background: gold;
    cursor: pointer;
}

canvas {
    display: none;
}
</style>
</head>

<body>

<div id="menu">
    <h1>🎢 COASTER RUSH 3D</h1>
    <button id="startBtn">START GAME</button>
</div>

<canvas id="game"></canvas>

<!-- 🎵 FREE MUSIC (No copyright issue) -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/21/audio_8f3b6c4c9c.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let speed = 0.25;
let offset = 0;
let playerY = 0;
let velocity = 0;
let score = 0;

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function track(x) {
    return Math.sin(x * 0.01) * 100 +
           Math.sin(x * 0.02) * 50;
}

function draw3D() {
    // sky gradient
    let grad = ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,"#0f2027");
    grad.addColorStop(1,"#2c5364");
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // stars
    for (let i = 0; i < 100; i++) {
        ctx.fillStyle = "white";
        ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2,2);
    }

    // 3D track
    for (let i = 0; i < 300; i++) {
        let z = i * 5;
        let scale = 300 / (z + 200);

        let x = canvas.width / 2;
        let y = canvas.height / 2 + track(offset + z) * scale;

        ctx.beginPath();
        ctx.arc(x, y, 4 * scale, 0, Math.PI*2);
        ctx.fillStyle = "#00ffcc";
        ctx.fill();
    }

    // coaster
    ctx.fillStyle = "red";
    ctx.fillRect(canvas.width/2 - 25, canvas.height/2 + playerY, 50, 25);

    // score
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 20, 40);
}

function update() {
    offset += speed * 50;
    score++;

    let ground = track(offset);

    velocity += 0.5;
    playerY += velocity;

    if (playerY > ground) {
        playerY = ground;
        velocity = 0;
    }

    if (keys["ArrowUp"]) velocity -= 1.2;
    if (keys["ArrowDown"]) velocity += 1.2;
}

function loop() {
    update();
    draw3D();
    requestAnimationFrame(loop);
}

document.getElementById("startBtn").onclick = () => {
    document.getElementById("menu").style.display = "none";
    canvas.style.display = "block";

    document.getElementById("music").play();

    loop();
};
</script>

</body>
</html>
