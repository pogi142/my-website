<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reaction Speed Game ⚡</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }h1 {
  margin-top: 40px;
  font-size: 2.5em;
}

#gameBox {
  margin: 50px auto;
  width: 80%;
  max-width: 500px;
  height: 300px;
  background: red;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5em;
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.3s;
}

#result {
  font-size: 1.5em;
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  font-size: 1em;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 20px;
}

  </style>
</head>
<body>  <h1>⚡ Reaction Speed Test ⚡</h1>
  <p>Wait for GREEN, then click as fast as you can!</p>  <div id="gameBox">Click Start</div>
  <button onclick="startGame()">Start</button>  <div id="result"></div>  <script>
    let startTime;
    let waiting = false;
    let ready = false;

    function startGame() {
      const box = document.getElementById("gameBox");
      const result = document.getElementById("result");

      box.style.background = "red";
      box.textContent = "Wait...";
      result.textContent = "";

      ready = false;
      waiting = true;

      let delay = Math.random() * 3000 + 2000; // 2-5 seconds

      setTimeout(() => {
        box.style.background = "green";
        box.textContent = "CLICK NOW!";
        startTime = new Date().getTime();
        ready = true;
        waiting = false;
      }, delay);
    }

    document.getElementById("gameBox").onclick = function () {
      const result = document.getElementById("result");

      if (waiting) {
        result.textContent = "❌ Too early! Wait for green!";
      }
      else if (ready) {
        let reactionTime = new Date().getTime() - startTime;
        result.textContent = "⚡ Your reaction time: " + reactionTime + " ms";
        ready = false;
      }
      else {
        result.textContent = "Click START to play!";
      }
    };
  </script></body>
</html>
