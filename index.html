<!DOCTYPE html>
<html>
<head>
  <title>Saif Word Game 🔥</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    #gameBox {
      background: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      margin: auto;
      margin-top: 30px;
    }

    input {
      padding: 10px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      width: 80%;
    }

    button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .submit { background: #00ffcc; }
    .hint { background: orange; }
  </style>
</head>

<body>

<h1>🔥 Saif Word Game 🔥</h1>

<div id="gameBox">
  <p id="level"></p>
  <p id="timer">⏱ 10</p>
  <h2 id="word"></h2>

  <input id="input" placeholder="Type answer..."><br><br>

  <button class="submit" onclick="check()">Submit</button>
  <button class="hint" onclick="hint()">Hint</button>

  <p id="result"></p>
</div>

<script>
let levels = [
"CAT","DOG","SUN","MAP","PEN","BOX","CAR",
"PLANT","WATER","LIGHT","STONE","SMILE",
"POCKET","MARKET","FUTURE","GARDEN",
"COUNTRY","PICTURE","HISTORY","LANGUAGE",
"COMPUTER","EDUCATION","KNOWLEDGE","CHALLENGE"
];

let level = 0;
let answer = "";
let time = 10;
let timer;

function startTimer(){
  clearInterval(timer);
  time = 10;

  timer = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = "⏱ " + time;

    if(time <= 0){
      clearInterval(timer);
      document.getElementById("result").innerText = "⏰ Time's up!";
    }
  },1000);
}

function loadLevel(){
  answer = levels[level];

  document.getElementById("level").innerText =
  "Level " + (level+1);

  document.getElementById("word").innerText =
  "_ ".repeat(answer.length);

  document.getElementById("result").innerText = "";
  document.getElementById("input").value = "";

  startTimer();
}

function check(){
  let input = document.getElementById("input").value.toUpperCase();

  if(input === answer){
    playSound(true);
    level++;

    if(level >= levels.length){
      document.getElementById("result").innerText = "🎉 YOU WIN!";
      clearInterval(timer);
      return;
    }

    loadLevel();
  } else {
    playSound(false);
    document.getElementById("result").innerText = "❌ Wrong!";
  }
}

function hint(){
  document.getElementById("result").innerText =
  "💡 First letter: " + answer[0];
}

function playSound(correct){
  let audio = new Audio(
    correct ?
    "https://www.soundjay.com/buttons/sounds/button-3.mp3" :
    "https://www.soundjay.com/buttons/sounds/button-10.mp3"
  );
  audio.play();
}

loadLevel();
</script>

</body>
</html>
