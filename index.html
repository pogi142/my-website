<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SAFE GAME</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body,html{margin:0;overflow:hidden;background:black;font-family:Arial;}

canvas{position:fixed;top:0;left:0;}

#menu{
position:absolute;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
background:#111;color:white;z-index:10;
flex-direction:column;
}

#ui{position:absolute;top:10px;left:10px;color:white;z-index:10;}
#chatInput{position:absolute;bottom:10px;left:10px;z-index:10;}

#joystick{
position:absolute;bottom:40px;right:40px;
width:100px;height:100px;border-radius:50%;
background:rgba(255,255,255,0.2);z-index:10;
}
#stick{
position:absolute;width:40px;height:40px;
background:white;border-radius:50%;
top:30px;left:30px;
}
</style>
</head>

<body>

<div id="menu">
<h1>GAME</h1>
<button onclick="startGame()">START</button>
</div>

<div id="ui">Coins: 0</div>
<input id="chatInput" placeholder="Chat...">

<div id="joystick"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene,camera,renderer,player;
let keys={},coins=0;
let joy={x:0,y:0};

function startGame(){
menu.style.display="none";

scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// light
let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);

// ground
let ground=new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshPhongMaterial({color:0x55aa55})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// player (SAFE cube)
player=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshPhongMaterial({color:0xff0000})
);
player.position.y=1;
scene.add(player);

// coins
for(let i=0;i<10;i++){
let c=new THREE.Mesh(
new THREE.SphereGeometry(0.5),
new THREE.MeshBasicMaterial({color:0xffff00})
);
c.position.set(Math.random()*50-25,1,Math.random()*50-25);
c.name="coin";
scene.add(c);
}

// controls
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// joystick
let joyDiv=document.getElementById("joystick");
joyDiv.addEventListener("touchmove",e=>{
let t=e.touches[0];
let r=joyDiv.getBoundingClientRect();
joy.x=(t.clientX-(r.left+50))/40;
joy.y=(t.clientY-(r.top+50))/40;
});
joyDiv.addEventListener("touchend",()=>{joy.x=0;joy.y=0;});

animate();
}

function move(){
if(!player)return;

let speed=0.2;
let dx=joy.x, dz=joy.y;

if(keys["w"])dz=-1;
if(keys["s"])dz=1;
if(keys["a"])dx=-1;
if(keys["d"])dx=1;

player.position.x+=dx*speed;
player.position.z+=dz*speed;
}

function collect(){
scene.children.forEach(o=>{
if(o.name==="coin" && player.position.distanceTo(o.position)<1){
scene.remove(o);
coins++;
ui.innerText="Coins: "+coins;
}
});
}

function animate(){
requestAnimationFrame(animate);

move();
collect();

if(player){
camera.position.set(player.position.x,5,player.position.z+10);
camera.lookAt(player.position);
}

renderer.render(scene,camera);
}
</script>

</body>
</html>
