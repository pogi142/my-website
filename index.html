<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connect Word Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family:Arial;
    text-align:center;
    background:linear-gradient(#4facfe,#00f2fe);
    color:white;
}

h1 { margin-top:20px; }

#word {
    font-size:30px;
    margin:20px;
    letter-spacing:10px;
}

#letters {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:30px;
}

.letter {
    width:60px;
    height:60px;
    margin:10px;
    background:white;
    color:black;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:25px;
    cursor:pointer;
    transition:0.2s;
}

.letter:hover {
    background:yellow;
}

#current {
    font-size:25px;
    margin-top:20px;
}

button {
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>🧠 CONNECT WORD</h1>

<div id="word"></div>
<div id="current">Word: </div>

<div id="letters"></div>

<button onclick="checkWord()">✅ Check</button>
<button onclick="resetWord()">❌ Reset</button>

<script>
let answer = "GAME";
let current = "";

let letters = answer.split("").sort(()=>Math.random()-0.5);

// show blanks
document.getElementById("word").innerText =
    "_ ".repeat(answer.length);

// create letters
let container = document.getElementById("letters");

letters.forEach(l=>{
    let div = document.createElement("div");
    div.className="letter";
    div.innerText=l;

    div.onclick=()=>{
        current += l;
        document.getElementById("current").innerText="Word: "+current;
    };

    container.appendChild(div);
});

// check
function checkWord(){
    if(current === answer){
        alert("🎉 Correct!");
        location.reload();
    } else {
        alert("❌ Wrong!");
    }
}

// reset
function resetWord(){
    current="";
    document.getElementById("current").innerText="Word:";
}
</script>

</body>
</html>
